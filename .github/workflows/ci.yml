name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Code Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Run clippy
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Check for broken links in docs
        run: |
          cargo doc --all-features --no-deps 2>&1 | tee /dev/stderr | grep -q "warning:" && exit 1 || true

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
          - os: macos-latest
            rust: stable
          - os: windows-latest
            rust: stable
          - os: ubuntu-latest
            rust: beta
          - os: ubuntu-latest
            rust: nightly

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rust-src

      - name: Build
        run: cargo build --all-features

      - name: Run tests
        run: cargo test --all-features --all-targets

      - name: Run doc tests
        run: cargo test --all-features --doc

  build-verification:
    name: Build Verification
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rninja-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rninja${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

      - name: Upload cached binary
        uses: actions/upload-artifact@v4
        with:
          name: rninja-cached-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rninja-cached${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

      - name: Upload daemon binary
        uses: actions/upload-artifact@v4
        with:
          name: rninja-daemon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/rninja-daemon${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run benchmarks
        run: cargo bench

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: target/criterion/report
          retention-days: 5
