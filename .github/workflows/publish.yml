name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  # Publish to crates.io
  publish-cargo:
    name: Publish to Cargo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build and create GitHub release with binaries
  build-release:
    name: Build & Release
    needs: publish-cargo
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build rninja
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Build rninja-cached
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} --bin rninja-cached
          else
            cargo build --release --target ${{ matrix.target }} --bin rninja-cached
          fi
        shell: bash

      - name: Create zip/tarball
        if: matrix.os != 'windows-latest'
        run: |
          tar czf rninja-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release rninja rninja-cached rninja-daemon

      - name: Create zip
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/rninja.exe,target/${{ matrix.target }}/release/rninja-cached.exe,target/${{ matrix.target }}/release/rninja-daemon.exe -DestinationPath rninja-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.target }}
          path: |
            ${{ matrix.os != 'windows-latest' && format('rninja-{0}-{1}.tar.gz', steps.version.outputs.VERSION, matrix.target) || '' }}
            ${{ matrix.os == 'windows-latest' && format('rninja-{0}-{1}.zip', steps.version.outputs.VERSION, matrix.target) || '' }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -o -name "*.zip" | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt
          retention-days: 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          tag_name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to NPM
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: packages/npm

      - name: Update package.json version
        run: |
          cd packages/npm
          sed -i "s/\"version\": \".*\"/\"version\": \"${{ steps.version.outputs.VERSION }}\"/" package.json

      - name: Publish to NPM
        working-directory: packages/npm
        run: |
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: neul-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: checksums

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FORMULA="homebrew-tap/Formula/rninja.rb"

          # Read checksums
          DARWIN_AMD64=$(grep "x86_64-apple-darwin" checksums/checksums.txt | awk '{print $1}')
          DARWIN_ARM64=$(grep "aarch64-apple-darwin" checksums/checksums.txt | awk '{print $1}')
          LINUX_AMD64=$(grep "x86_64-unknown-linux-gnu" checksums/checksums.txt | awk '{print $1}')
          LINUX_ARM64=$(grep "aarch64-unknown-linux-gnu" checksums/checksums.txt | awk '{print $1}')

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"
          sed -i "s|url \"https://github.com/neul-labs/rninja/releases/download/v.*/rninja-.*-x86_64-apple-darwin.tar.gz\"|url \"https://github.com/neul-labs/rninja/releases/download/v$VERSION/rninja-$VERSION-x86_64-apple-darwin.tar.gz\"|" "$FORMULA"
          sed -i "s|url \"https://github.com/neul-labs/rninja/releases/download/v.*/rninja-.*-aarch64-apple-darwin.tar.gz\"|url \"https://github.com/neul-labs/rninja/releases/download/v$VERSION/rninja-$VERSION-aarch64-apple-darwin.tar.gz\"|" "$FORMULA"
          sed -i "s|url \"https://github.com/neul-labs/rninja/releases/download/v.*/rninja-.*-x86_64-unknown-linux-gnu.tar.gz\"|url \"https://github.com/neul-labs/rninja/releases/download/v$VERSION/rninja-$VERSION-x86_64-unknown-linux-gnu.tar.gz\"|" "$FORMULA"
          sed -i "s|url \"https://github.com/neul-labs/rninja/releases/download/v.*/rninja-.*-aarch64-unknown-linux-gnu.tar.gz\"|url \"https://github.com/neul-labs/rninja/releases/download/v$VERSION/rninja-$VERSION-aarch64-unknown-linux-gnu.tar.gz\"|" "$FORMULA"

          python3 <<PYEOF
          import re
          formula = open("$FORMULA").read()
          formula = re.sub(r'sha256 "placeholder_sha256"', f'sha256 "{DARWIN_AMD64}"', formula, count=1)
          formula = re.sub(r'sha256 "placeholder_sha256"', f'sha256 "{DARWIN_ARM64}"', formula, count=1)
          formula = re.sub(r'sha256 "placeholder_sha256"', f'sha256 "{LINUX_AMD64}"', formula, count=1)
          formula = re.sub(r'sha256 "placeholder_sha256"', f'sha256 "{LINUX_ARM64}"', formula, count=1)
          open("$FORMULA", "w").write(formula)
          PYEOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rninja.rb
          git diff --quiet --cached && exit 0
          git commit -m "rninja ${{ steps.version.outputs.VERSION }}"
          git push

  publish-pypi:
    name: Publish to PyPI
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Update version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" packages/pypi/pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" packages/pypi/rninja/__init__.py
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" packages/pypi/rninja/cli.py

      - name: Build package
        working-directory: packages/pypi
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pypi/dist
